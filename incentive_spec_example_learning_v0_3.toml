[spec]
version = "0.3"
name = "learning_reference_v03"
domain = "learning_smoke"

[experiment]
steps = 6
seeds = [11]
schedule = "sequential_fixed"

[observability]
enabled = true
streams = ["events", "observations", "policy_decisions", "metrics", "memory"]
artifact_dir = ".artifacts/runs"
jsonl = true

[outcome_space]
channels = [
  "observed.reward_signal",
  "agent.personal_payoff"
]

[states]
initial_global = "start"
all = ["start", "setup"]

[actions]
all = ["invest", "cash_out", "harvest"]

[visibility_profiles.full]
graph = "full_graph"
observed_outcomes = "full_numeric"
latent_outcomes = "hidden"
governance_outcomes = "hidden"
sanctions = "hidden"
audit_probabilities = "hidden"
prompts = false

[archetypes.q_learner]
policy = "q_learning_simple"
role = "learner"
visibility_profile = "full"

[archetypes.q_learner.scalarizer]
"agent.personal_payoff" = 1.0

[archetypes.q_learner.behavior]
exploration_rate = 0.0
learning_rate = 0.5
discount_factor = 0.9

[[population]]
archetype = "q_learner"
count = 1

[[transitions]]
id = "invest"
from = "start"
action = "invest"
to = "setup"
availability = "hard_available"
norm_status = "permitted"
tags = ["setup"]

[transitions.effects]
"observed.reward_signal" = 0.0
"agent.personal_payoff" = 0.0

[[transitions]]
id = "cash_out"
from = "start"
action = "cash_out"
to = "start"
availability = "hard_available"
norm_status = "permitted"
tags = ["short_term"]

[transitions.effects]
"observed.reward_signal" = 1.0
"agent.personal_payoff" = 1.0

[[transitions]]
id = "harvest"
from = "setup"
action = "harvest"
to = "start"
availability = "hard_available"
norm_status = "permitted"
tags = ["delayed_reward"]

[transitions.effects]
"observed.reward_signal" = 5.0
"agent.personal_payoff" = 5.0
