[pack]
id = "public_goods"
title = "Public Goods"
description = "Shared-resource incentives, sanctions, communication, and collusion pressure."
spec_file = "spec.toml"
hook = "icframe.domain_packs.public_goods.hooks:PublicGoodsHooks"

[study]
single_objective = "trusted_score"
pareto_objectives = ["social_welfare", "exploit_rate", "governance_cost"]

[[study.presets]]
id = "returns_and_audits"
label = "Returns and audits"
description = "Map shared-resource returns against governance pressure."
planner = "matrix"
objectives = ["social_welfare", "exploit_rate", "governance_cost"]
seeds = [7, 11, 19]

[study.presets.parameter_matrix]
return_multiplier = [0.8, 1.2, 1.6, 2.0, 2.4]
audit_probability = [0.0, 0.25, 0.5, 0.75, 1.0]

[study.presets.visualization]
x_metric = "exploit_rate"
y_metric = "social_welfare"
color_metric = "governance_cost"

[validation]
golden_seeds = [7, 11, 19]
report_metrics = ["trusted_score", "social_welfare", "exploit_rate", "governance_cost"]

[[population_templates]]
id = "cooperator"
label = "Cooperator"
description = "Contributes to the shared resource and values social welfare."
archetype = "cooperator"
count = 1
[[population_templates]]
id = "learner"
label = "Adaptive learner"
description = "Explores contribution strategies using an epsilon-greedy bandit."
archetype = "learner"
count = 1
[[population_templates]]
id = "opportunist"
label = "Opportunist"
description = "Prioritizes private payoff and may tamper with governance."
archetype = "opportunist"
count = 1

[report.mechanics_flow]
title = "Public-goods causal flow"
description = "Explanatory projection of contribution, signaling, shared returns, governance, and outcomes."
[[report.mechanics_flow.stages]]
id = "choice"
label = "Participant choice"
[[report.mechanics_flow.stages]]
id = "mechanism"
label = "Shared mechanisms"
[[report.mechanics_flow.stages]]
id = "outcome"
label = "Outcomes"
[[report.mechanics_flow.nodes]]
id = "resource_choice"
label = "Contribute or withhold"
stage = "choice"
kind = "action"
evidence = ["transition:contribute", "transition:withhold"]
[[report.mechanics_flow.nodes]]
id = "signal"
label = "Social signal"
stage = "choice"
kind = "action"
evidence = ["transition:signal"]
[[report.mechanics_flow.nodes]]
id = "tamper"
label = "Governance tampering"
stage = "choice"
kind = "action"
evidence = ["transition:tamper"]
[[report.mechanics_flow.nodes]]
id = "shared_return"
label = "Shared-resource return"
stage = "mechanism"
kind = "mechanism"
evidence = ["hook:return_multiplier", "transition:contribute", "transition:withhold"]
[[report.mechanics_flow.nodes]]
id = "governance"
label = "Audit and enforcement"
stage = "mechanism"
kind = "enforcement"
evidence = ["enforcement:tamper"]
[[report.mechanics_flow.nodes]]
id = "payoff"
label = "Participant payoff"
stage = "outcome"
kind = "outcome"
evidence = ["outcome:agent.payoff"]
[[report.mechanics_flow.nodes]]
id = "welfare"
label = "Social welfare and trust"
stage = "outcome"
kind = "outcome"
evidence = ["outcome:latent.social_welfare", "outcome:social.trust"]
[[report.mechanics_flow.nodes]]
id = "governance_cost"
label = "Governance cost"
stage = "outcome"
kind = "outcome"
evidence = ["outcome:governance.cost"]
[[report.mechanics_flow.edges]]
source = "resource_choice"
target = "shared_return"
evidence = ["transition:contribute", "transition:withhold"]
[[report.mechanics_flow.edges]]
source = "signal"
target = "welfare"
evidence = ["transition:signal"]
[[report.mechanics_flow.edges]]
source = "tamper"
target = "governance"
evidence = ["enforcement:tamper"]
[[report.mechanics_flow.edges]]
source = "shared_return"
target = "payoff"
evidence = ["hook:return_multiplier"]
[[report.mechanics_flow.edges]]
source = "shared_return"
target = "welfare"
evidence = ["outcome:latent.social_welfare"]
[[report.mechanics_flow.edges]]
source = "governance"
target = "governance_cost"
evidence = ["outcome:governance.cost"]
[[report.mechanics_flow.edges]]
source = "governance"
target = "payoff"
label = "declared sanctions"
evidence = ["enforcement:tamper"]

[report.metrics.trusted_score]
label = "Trusted score"
description = "Combined welfare, exploitation, and governance objective."
unit = "score"
format = "number"
desired_direction = "maximize"
category = "outcome"
headline_order = 0
chart_group = "outcomes"

[report.metrics.social_welfare]
label = "Social welfare"
description = "Cumulative welfare created across the population."
unit = "utility"
format = "number"
desired_direction = "maximize"
category = "outcome"
headline_order = 1
chart_group = "outcomes"

[report.metrics.exploit_rate]
label = "Exploit rate"
description = "Share of actions tagged as exploitation."
unit = "share"
format = "percent"
desired_direction = "minimize"
category = "risk"
headline_order = 2
chart_group = "risks"

[report.metrics.governance_cost]
label = "Governance cost"
description = "Cumulative cost of audits and enforcement."
unit = "utility"
format = "number"
desired_direction = "minimize"
category = "cost"
headline_order = 3
chart_group = "risks"

[[report.chart_groups]]
id = "outcomes"
label = "Outcomes"
metrics = ["trusted_score", "social_welfare"]

[[report.chart_groups]]
id = "risks"
label = "Risk and enforcement"
metrics = ["exploit_rate", "governance_cost"]

[[parameters]]
id = "steps"
label = "Rounds"
description = "Number of public-goods rounds in one experiment."
unit = "steps"
type = "integer"
default = 30
minimum = 1
maximum = 100000
optimizable = false
step = 1
quick_values = [
  { label = "Smoke", value = 5 },
  { label = "Standard", value = 30 },
  { label = "Thorough", value = 300 },
]
[parameters.target]
entity = "experiment"
field = ["steps"]

[[parameters]]
id = "learners"
label = "Learning agents"
description = "Number of adaptive participants sharing the public pool."
unit = "agents"
type = "integer"
default = 2
minimum = 1
maximum = 20
optimizable = true
step = 1
[parameters.target]
entity = "population"
entity_id = "learner"
field = ["count"]

[[parameters]]
id = "return_multiplier"
label = "Public return multiplier"
description = "Multiplier applied to the shared contribution pool before distribution."
type = "float"
default = 1.6
minimum = 0.1
maximum = 4.0
optimizable = true
step = 0.1
[parameters.target]
entity = "hook_config"
field = ["return_multiplier"]

[[parameters]]
id = "audit_probability"
label = "Tamper audit probability"
description = "Chance that an attempted governance tamper is audited."
unit = "probability"
type = "float"
default = 0.25
minimum = 0.0
maximum = 1.0
optimizable = true
step = 0.01
[parameters.target]
entity = "transition"
entity_id = "tamper"
field = ["enforcement", "audit_probability"]
