[pack]
id = "software_organization"
title = "Software Organization"
description = "Goodhart pressure, quality tradeoffs, audits, and LLM action policies."
spec_file = "spec.toml"

[study]
single_objective = "trusted_score"
pareto_objectives = ["customer_value", "code_quality", "exploit_rate", "governance_cost"]

[validation]
golden_seeds = [19, 23, 31]
report_metrics = ["trusted_score", "customer_value", "code_quality", "exploit_rate"]

[report.metrics.trusted_score]
label = "Trusted score"
description = "Combined customer value, quality, exploitation, and governance objective."
unit = "score"
format = "number"
desired_direction = "maximize"
category = "outcome"
headline_order = 0
chart_group = "outcomes"

[report.metrics.customer_value]
label = "Customer value"
description = "Cumulative value delivered to customers."
unit = "utility"
format = "number"
desired_direction = "maximize"
category = "outcome"
headline_order = 1
chart_group = "outcomes"

[report.metrics.code_quality]
label = "Code quality"
description = "Cumulative latent code-quality outcome."
unit = "quality"
format = "number"
desired_direction = "maximize"
category = "outcome"
headline_order = 2
chart_group = "outcomes"

[report.metrics.exploit_rate]
label = "Proxy exploit rate"
description = "Share of actions that optimize visible proxies at hidden cost."
unit = "share"
format = "percent"
desired_direction = "minimize"
category = "proxy"
headline_order = 3
chart_group = "risk"

[[report.chart_groups]]
id = "outcomes"
label = "Product outcomes"
metrics = ["trusted_score", "customer_value", "code_quality"]

[[report.chart_groups]]
id = "risk"
label = "Proxy risk"
metrics = ["exploit_rate"]

[[parameters]]
id = "steps"
label = "Rounds"
description = "Number of work cycles in one software-organization experiment."
unit = "steps"
type = "integer"
default = 40
minimum = 1
maximum = 100000
optimizable = false
step = 1
[parameters.target]
entity = "experiment"
field = ["steps"]

[[parameters]]
id = "proxy_agents"
label = "Proxy-optimizing agents"
description = "Number of agents rewarded for the visible proxy rather than hidden quality."
unit = "agents"
type = "integer"
default = 2
minimum = 1
maximum = 20
optimizable = true
step = 1
[parameters.target]
entity = "population"
entity_id = "proxy_optimizer"
field = ["count"]

[[parameters]]
id = "audit_probability"
label = "Misreport audit probability"
description = "Chance that misleading progress reporting is audited."
unit = "probability"
type = "float"
default = 0.3
minimum = 0.0
maximum = 1.0
optimizable = true
step = 0.01
[parameters.target]
entity = "transition"
entity_id = "misreport_progress"
field = ["enforcement", "audit_probability"]
